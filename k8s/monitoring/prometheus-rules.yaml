apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: todo-app-alerts
  namespace: monitoring
  labels:
    release: monitoring-stack

spec:
  groups:
    - name: todo-app.rules
      rules:
        - alert: BackendDeploymentDown
          expr: kube_deployment_status_replicas_available{deployment="backend",namespace="todo-app"} < 1
          for: 1m
          labels:
            severity: critical
            team: todo-app
          annotations:
            summary: "Backend Deployment Down"
            description: "No backend replicas are available."

        - alert: FrontendDeploymentDown
          expr: kube_deployment_status_replicas_available{deployment="frontend",namespace="todo-app"} < 1
          for: 1m
          labels:
            severity: critical
            team: todo-app
          annotations:
            summary: "Frontend Deployment Down"
            description: "No frontend replicas are available."

        - alert: HighMemoryUsage
          expr: container_memory_usage_bytes{namespace="todo-app"} > 200000000
          for: 2m
          labels:
            severity: warning
            team: todo-app
          annotations:
            summary: "High Memory Usage"
            description: "Container memory usage is above 200MB."
