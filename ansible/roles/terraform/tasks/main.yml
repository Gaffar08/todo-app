---
- name: Install dependencies
  apt:
    name:
      - unzip
      - wget
    state: present

- name: Download Terraform
  get_url:
    url: https://releases.hashicorp.com/terraform/1.12.2/terraform_1.12.2_linux_amd64.zip
    dest: /tmp/terraform.zip

- name: Unzip Terraform
  unarchive:
    src: /tmp/terraform.zip
    dest: /usr/local/bin
    remote_src: yes