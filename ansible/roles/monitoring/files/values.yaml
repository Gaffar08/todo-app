alertmanager:
  alertmanagerSpec:
    externalUrl: ""

grafana:

  additionalDataSources:

    - name: Loki
      type: loki
      access: proxy
      url: http://loki.logging.svc.cluster.local:3100
      editable: true

      
prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        memory: 400Mi