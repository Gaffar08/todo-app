version: 2.1

jobs:

  backend-build-and-push:
    machine: true

    steps:
      - checkout

      - run:
          name: Install Backend Dependencies
          command: |
            cd backend
            npm install

      - run:
          name: DockerHub Login
          command: |
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - run:
          name: OWASP Dependency Check Backend
          command: |
            mkdir -p backend-report

            docker run --rm \
              -e NVD_API_KEY=${NVD_API_KEY} \
              -v $(pwd):/src \
              owasp/dependency-check:latest \
              --nvdApiKey ${NVD_API_KEY} \
              --scan /src/backend \
              --format JSON \
              --out /src/backend-report

      - store_artifacts:
          path: backend-report

      - run:
          name: Build Backend Docker Image
          command: |
            docker build -t gaffar08/todo-backend:latest ./backend

      - run:
          name: Trivy Backend Scan
          command: |
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy image \
              gaffar08/todo-backend:latest

      - run:
          name: Push Backend Docker Image
          command: |
            docker push gaffar08/todo-backend:latest



  frontend-build-and-push:
    machine: true

    steps:
      - checkout

      - run:
          name: Install Frontend Dependencies
          command: |
            cd frontend
            npm install

      - run:
          name: DockerHub Login
          command: |
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - run:
          name: OWASP Dependency Check Frontend
          command: |
            mkdir -p frontend-report

            docker run --rm \
              -e NVD_API_KEY=${NVD_API_KEY} \
              -v $(pwd):/src \
              owasp/dependency-check:latest \
              --nvdApiKey ${NVD_API_KEY} \
              --scan /src/frontend \
              --format JSON \
              --out /src/frontend-report

      - store_artifacts:
          path: frontend-report

      - run:
          name: Build Frontend Docker Image
          command: |
            docker build -t gaffar08/todo-frontend:latest ./frontend

      - run:
          name: Trivy Frontend Scan
          command: |
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy image \
              gaffar08/todo-frontend:latest

      - run:
          name: Push Frontend Docker Image
          command: |
            docker push gaffar08/todo-frontend:latest



workflows:
  version: 2

  build-and-push:
    jobs:
      - backend-build-and-push
      - frontend-build-and-push