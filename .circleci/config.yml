version: 2.1

jobs:

  backend-build-and-push:
    machine: true

    steps:
      - checkout

      - run:
          name: Build Backend Docker Image
          command: |
            docker build -t gaffar08/todo-backend:latest ./backend

      - run:
          name: Install Trivy
          command: |
            sudo apt-get update
            sudo apt-get install -y wget apt-transport-https gnupg lsb-release
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
            echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install -y trivy

      - run:
          name: Scan Backend Docker Image
          command: |
            trivy image gaffar08/todo-backend:latest

      - run:
          name: DockerHub Login
          command: |
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - run:
          name: Push Backend Docker Image
          command: |
            docker push gaffar08/todo-backend:latest

  frontend-build-and-push:
    machine: true

    steps:
      - checkout

      - run:
          name: Build Frontend Docker Image
          command: |
            docker build -t gaffar08/todo-frontend:latest ./frontend

      - run:
          name: Install Trivy
          command: |
            sudo apt-get update
            sudo apt-get install -y wget apt-transport-https gnupg lsb-release
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
            echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install -y trivy

      - run:
          name: Scan Frontend Docker Image
          command: |
            trivy image gaffar08/todo-frontend:latest

      - run:
          name: DockerHub Login
          command: |
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - run:
          name: Push Frontend Docker Image
          command: |
            docker push gaffar08/todo-frontend:latest

workflows:
  version: 2

  build-and-push:
    jobs:
      - backend-build-and-push
      - frontend-build-and-push