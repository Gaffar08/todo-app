version: 2.1

setup: true

orbs:
  path-filtering: circleci/path-filtering@0.1.3

workflows:
  detect-changes:
    jobs:
      - path-filtering/filter:
          name: detect-changes

          base-revision: main

          config-path: .circleci/continue-config.yml

          mapping: |
            backend/.* backend true
            frontend/.* frontend true