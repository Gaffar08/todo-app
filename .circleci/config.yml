version: 2.1

jobs:

  backend-build-and-push:
    machine: true

    steps:
      - checkout

      - run:
          name: Install Backend Dependencies
          command: |
            cd backend
            npm install

      - run:
          name: DockerHub Login
          command: |
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - run:
          name: OWASP Dependency Check Backend
          command: |
            mkdir -p backend-report

            docker run --rm \
              -e NVD_API_KEY=${NVD_API_KEY} \
              -v $(pwd):/src \
              owasp/dependency-check:latest \
              --nvdApiKey ${NVD_API_KEY} \
              --scan /src/backend \
              --format JSON \
              --out /src/backend-report || true

      - store_artifacts:
          path: backend-report

      - run:
          name: Build Backend Image
          command: |
            docker build \
            -t gaffar08/todo-backend:${CIRCLE_BUILD_NUM} \
            ./backend

      - run:
          name: Trivy Backend Scan
          command: |
            docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image \
            gaffar08/todo-backend:${CIRCLE_BUILD_NUM}

      - run:
          name: Push Backend Image
          command: |
            docker push gaffar08/todo-backend:${CIRCLE_BUILD_NUM}

      - run:
          name: Update Backend Manifest
          command: |
            sed -i "s|image: gaffar08/todo-backend:.*|image: gaffar08/todo-backend:${CIRCLE_BUILD_NUM}|g" \
            k8s/backend/deployment.yaml

      - run:
          name: Commit Backend Manifest
          command: |
            git config user.email "circleci@local"
            git config user.name "CircleCI"

            git add k8s/backend/deployment.yaml

            git commit -m "Update backend image ${CIRCLE_BUILD_NUM}" || true

      - run:
          name: Push Manifest Changes
          command: |
            git remote set-url origin https://${GITHUB_USERNAME}:${GITHUB_TOKEN}@github.com/Gaffar08/todo-app.git

            git push origin main



  frontend-build-and-push:
    machine: true

    steps:
      - checkout

      - run:
          name: Install Frontend Dependencies
          command: |
            cd frontend
            npm install

      - run:
          name: DockerHub Login
          command: |
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - run:
          name: OWASP Dependency Check Frontend
          command: |
            mkdir -p frontend-report

            docker run --rm \
              -e NVD_API_KEY=${NVD_API_KEY} \
              -v $(pwd):/src \
              owasp/dependency-check:latest \
              --nvdApiKey ${NVD_API_KEY} \
              --scan /src/frontend \
              --format JSON \
              --out /src/frontend-report || true

      - store_artifacts:
          path: frontend-report

      - run:
          name: Build Frontend Image
          command: |
            docker build \
            -t gaffar08/todo-frontend:${CIRCLE_BUILD_NUM} \
            ./frontend

      - run:
          name: Trivy Frontend Scan
          command: |
            docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image \
            gaffar08/todo-frontend:${CIRCLE_BUILD_NUM}

      - run:
          name: Push Frontend Image
          command: |
            docker push gaffar08/todo-frontend:${CIRCLE_BUILD_NUM}

      - run:
          name: Update Frontend Manifest
          command: |
            sed -i "s|image: gaffar08/todo-frontend:.*|image: gaffar08/todo-frontend:${CIRCLE_BUILD_NUM}|g" \
            k8s/frontend/deployment.yaml

      - run:
          name: Commit Frontend Manifest
          command: |
            git config user.email "circleci@local"
            git config user.name "CircleCI"

            git add k8s/frontend/deployment.yaml

            git commit -m "Update frontend image ${CIRCLE_BUILD_NUM}" || true

      - run:
          name: Push Manifest Changes
          command: |
            git remote set-url origin https://${GITHUB_USERNAME}:${GITHUB_TOKEN}@github.com/Gaffar08/todo-app.git

            git push origin main



workflows:
  version: 2

  build-and-push:
    jobs:
      - backend-build-and-push
      - frontend-build-and-push